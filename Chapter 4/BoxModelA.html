<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>box</title>
    <style>
    .box {
        background-color: aliceblue;
        border-radius: 12rem;
        padding: 2rem 2rem;
        margin: 2rem 2rem ;
        box-sizing: border-box;
        min-width: 280px;
        max-height: 700px;
        border: solid 15px blue;
        margin-inline: 20px;
        margin-block: 20px;
        


    }

    .box img{
      width: 100%;
        height: 220px;
        object-fit: cover;
        border-radius: 10px;
        margin-bottom: 1rem;
    }

    .box p{
        text-align: center;
        margin: 4rem;
    }

    </style>
</head>
<body>
    <div class="box">
        <img src="" alt="picture">
    </div>
    <p>
        game
    </p>
</body>
</html>
